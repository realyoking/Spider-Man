<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spider-Gwen: Spider-Verse</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #joystick-zone { position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px; z-index: 100; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; font-family: sans-serif; }
        #attack-btn { position: absolute; bottom: 40px; right: 40px; width: 70px; height: 70px; background: rgba(255,0,100,0.6); border: 2px solid white; border-radius: 50%; color: white; font-weight: bold; z-index: 100; }
    </style>
</head>
<body>

    <div id="ui">
        <h3 style="margin:0">Spider-Gwen</h3>
        <small id="status">Loading multiversal data...</small>
    </div>
    
    <button id="attack-btn">HIT</button>
    <div id="joystick-zone"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, clock, player, mixer, controls;
        let actions = {}, currentAction;
        let moveData = { x: 0, y: 0, active: false };

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.Fog(0x050505, 10, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 6);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Orbit Controls (Rotation & Zoom)
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.minDistance = 2;
            controls.maxDistance = 15;
            controls.enablePan = false; // Keep camera centered on Gwen
            controls.maxPolarAngle = Math.PI / 1.8; // Prevent looking under the floor

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const spot = new THREE.SpotLight(0xff00ff, 50);
            spot.position.set(5, 10, 5);
            scene.add(spot);

            // Floor
            const grid = new THREE.GridHelper(100, 40, 0xff00ff, 0x222222);
            scene.add(grid);

            // Load Model
            const loader = new GLTFLoader();
            const modelUrl = './spider-gwen_-_across_the_spider-verse.glb';
            
            loader.load(modelUrl, (gltf) => {
                player = gltf.scene;
                player.traverse(n => { if(n.isMesh) n.castShadow = true; });
                scene.add(player);
                
                mixer = new THREE.AnimationMixer(player);
                
                // Map animations
                gltf.animations.forEach(clip => {
                    const name = clip.name.toLowerCase();
                    actions[name] = mixer.clipAction(clip);
                });

                // Default to Idle
                fadeTo('idle'); 
                document.getElementById('status').innerText = "System Online";
                animate();
            });

            // Joystick
            const manager = nipplejs.create({
                zone: document.getElementById('joystick-zone'),
                mode: 'static',
                position: { left: '60px', bottom: '60px' },
                color: 'white'
            });

            manager.on('move', (evt, data) => {
                moveData.x = data.vector.x;
                moveData.y = data.vector.y;
                moveData.force = data.force;
                moveData.active = true;
            });

            manager.on('end', () => { moveData.active = false; });

            // Attack Button
            document.getElementById('attack-btn').addEventListener('pointerdown', () => {
                fadeTo('attack', 0.1);
                setTimeout(() => fadeTo(moveData.active ? 'run' : 'idle', 0.4), 800);
            });
        }

        function fadeTo(name, duration = 0.3) {
            // Find action by name (contains check in case naming is weird)
            let target = actions[name];
            if (!target) {
                // Fallback: search for names containing the string
                const key = Object.keys(actions).find(k => k.includes(name));
                if (key) target = actions[key];
            }

            if (target && currentAction !== target) {
                if (currentAction) currentAction.fadeOut(duration);
                target.reset().fadeIn(duration).play();
                currentAction = target;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            if (mixer) mixer.update(dt);

            if (player && moveData.active) {
                // Movement relative to camera view
                const angle = Math.atan2(moveData.x, moveData.y);
                const cameraAngle = Math.atan2(
                    camera.position.x - player.position.x, 
                    camera.position.z - player.position.z
                );
                
                const finalRotation = angle + cameraAngle;
                player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, finalRotation, 0.1);

                const speed = moveData.force > 1 ? 0.15 : 0.07;
                player.position.x += Math.sin(finalRotation) * speed;
                player.position.z += Math.cos(finalRotation) * speed;

                // Animation Switch
                if (moveData.force > 1) fadeTo('run');
                else fadeTo('walk');
            } else if (player && currentAction && !currentAction.getClip().name.toLowerCase().includes('attack')) {
                fadeTo('idle');
            }

            // Keep OrbitControls centered on player
            if (player) {
                controls.target.copy(player.position).add(new THREE.Vector3(0, 1.5, 0));
                controls.update();
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>

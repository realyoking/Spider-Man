<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spider-Gwen: Spider-Verse Quest</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 2px 2px #000; }
        #instructions { position: absolute; bottom: 20px; right: 20px; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Spider-Gwen</h1>
        <p>NPCs nearby: <span id="npc-count">0</span></p>
    </div>

    <div id="instructions">
        WASD to Move | SHIFT to Dash | SPACE to Jump | Click to Hit
    </div>

    <div id="joystick-zone"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- GAME SETTINGS ---
        let scene, camera, renderer, clock, player, mixer, animations = {};
        let currentAction, moveDirection = new THREE.Vector3();
        let npcs = [];
        
        const keys = { w: false, a: false, s: false, d: false, shift: false };

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // Sky blue
            scene.fog = new THREE.Fog(0x87ceeb, 10, 100);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            sun.castShadow = true;
            scene.add(sun);

            // Floor (The "GTA City" ground)
            const floorGeom = new THREE.PlaneGeometry(200, 200);
            const floorMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
            const floor = new THREE.Mesh(floorGeom, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Load Spider-Gwen Model
            const loader = new GLTFLoader();
            loader.load('./spider_gwen.glb', (gltf) => {
                player = gltf.scene;
                player.scale.set(1, 1, 1);
                player.traverse(child => { if(child.isMesh) child.castShadow = true; });
                scene.add(player);

                // Setup Animations
                mixer = new THREE.AnimationMixer(player);
                gltf.animations.forEach(clip => {
                    // This maps your model's poses to triggers
                    animations[clip.name.toLowerCase()] = mixer.clipAction(clip);
                    console.log("Loaded animation:", clip.name);
                });

                // Start with Idle pose if exists
                if(animations['idle']) animations['idle'].play();
                
                spawnNPCs(10);
                animate();
            });

            // Inputs
            window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
            window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });
            window.addEventListener('mousedown', () => playAction('hit')); // Trigger hit pose
        }

        function playAction(name) {
            const action = animations[name];
            if (action && currentAction !== action) {
                if (currentAction) currentAction.fadeOut(0.2);
                action.reset().fadeIn(0.2).play();
                currentAction = action;
            }
        }

        function spawnNPCs(count) {
            for(let i=0; i<count; i++) {
                const npc = new THREE.Mesh(
                    new THREE.BoxGeometry(1, 2, 1),
                    new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff })
                );
                npc.position.set(Math.random()*40-20, 1, Math.random()*40-20);
                scene.add(npc);
                npcs.push(npc);
            }
            document.getElementById('npc-count').innerText = npcs.length;
        }

        function updatePlayer(dt) {
            if (!player) return;

            let speed = keys.shift ? 0.2 : 0.1;
            let moving = false;

            if (keys.w) { player.translateZ(speed); moving = true; }
            if (keys.s) { player.translateZ(-speed); moving = true; }
            if (keys.a) { player.rotation.y += 0.05; moving = true; }
            if (keys.d) { player.rotation.y -= 0.05; moving = true; }

            // Animation Logic
            if (moving) {
                if (keys.shift) playAction('run');
                else playAction('walk');
            } else {
                playAction('idle');
            }

            // Camera follow (Third Person)
            const relativeCameraOffset = new THREE.Vector3(0, 5, -10);
            const cameraOffset = relativeCameraOffset.applyMatrix4(player.matrixWorld);
            camera.position.lerp(cameraOffset, 0.1);
            camera.lookAt(player.position.x, player.position.y + 2, player.position.z);
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            if (mixer) mixer.update(dt);
            updatePlayer(dt);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

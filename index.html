<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spider-Gwen Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        #container { width: 100vw; height: 100vh; }
        #joystick-zone { position: absolute; bottom: 50px; left: 50px; width: 150px; height: 150px; z-index: 10; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; z-index: 10; }
        #debug { position: absolute; top: 80px; left: 20px; color: #ff0055; font-size: 12px; z-index: 10; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0">Spider-Gwen</h2>
        <div id="status">Loading Model...</div>
    </div>
    <div id="debug"></div>
    <div id="joystick-zone"></div>
    <div id="container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer, clock, player, mixer;
        let actions = {};
        let currentAction;
        let moveData = { x: 0, y: 0, active: false };

        const debugEl = document.getElementById('debug');
        const statusEl = document.getElementById('status');

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x220022); // Dark purple vibe

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('container').appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Lights
            scene.add(new THREE.AmbientLight(0xffffff, 1));
            const sun = new THREE.DirectionalLight(0xffffff, 2);
            sun.position.set(5, 10, 5);
            scene.add(sun);

            // Ground
            const grid = new THREE.GridHelper(100, 50, 0xff00ff, 0x444444);
            scene.add(grid);

            // LOAD MODEL
            const loader = new GLTFLoader();
            // IMPORTANT: Ensure 'spider_gwen.glb' is in the SAME folder as this HTML file
            loader.load('./spider_gwen.glb', 
                (gltf) => {
                    player = gltf.scene;
                    scene.add(player);
                    statusEl.innerText = "Gwen Ready! Use Joystick";
                    
                    mixer = new THREE.AnimationMixer(player);
                    gltf.animations.forEach(clip => {
                        actions[clip.name.toLowerCase()] = mixer.clipAction(clip);
                    });

                    // Auto-play first animation found
                    if (gltf.animations.length > 0) {
                        currentAction = mixer.clipAction(gltf.animations[0]);
                        currentAction.play();
                    }
                    animate();
                },
                undefined,
                (error) => {
                    debugEl.innerText = "Error loading model: " + error.message;
                    statusEl.innerText = "Model Not Found!";
                }
            );

            // Joystick Setup
            const joystick = nipplejs.create({
                zone: document.getElementById('joystick-zone'),
                mode: 'static',
                position: { left: '75px', bottom: '75px' },
                color: 'magenta'
            });

            joystick.on('move', (evt, data) => {
                moveData.x = data.vector.x;
                moveData.y = data.vector.y;
                moveData.active = true;
            });

            joystick.on('end', () => {
                moveData.active = false;
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            if (mixer) mixer.update(dt);

            if (player && moveData.active) {
                // Move player based on joystick
                player.position.x += moveData.x * 0.1;
                player.position.z -= moveData.y * 0.1;
                
                // Rotate player to face direction
                const angle = Math.atan2(moveData.x, moveData.y);
                player.rotation.y = angle;

                // Follow camera
                camera.position.set(player.position.x, player.position.y + 5, player.position.z + 10);
                camera.lookAt(player.position);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
